<style>
  body { background: var(--cream-deep); }
  .login-card { max-width:400px; margin:60px auto; background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:40px 34px; }
  .login-card h1 { font-size:1.6rem; text-align:center; margin-bottom:6px; }
  .login-card p.sub { text-align:center; color:var(--ink-soft); font-size:.9rem; margin:0 0 26px; }
  .login-card .field { margin-bottom:18px; }
  .login-card label { display:block; font-size:.74rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:7px; }
  .login-card input { width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:var(--radius); font-family:var(--sans); }
  .login-card input:focus { outline:none; border-color:var(--gold); }
  .login-card .btn { width:100%; text-align:center; margin-top:8px; }
  .login-err { display:none; color:#a8402d; font-size:.85rem; margin-top:14px; text-align:center; }
  .login-lang { text-align:center; margin-bottom:18px; }
  .login-lang button { background:none; border:1px solid var(--line); border-radius:20px; padding:5px 14px; margin:0 3px; cursor:pointer; font-family:var(--sans); font-size:.75rem; color:var(--ink-soft); }
  .login-lang button.active { background:var(--gold); color:#fff; border-color:var(--gold); }

  .hub { display:grid; grid-template-columns:230px 1fr; min-height:100vh; }
  .side { background:var(--dark); color:var(--cream); padding:24px 0; position:sticky; top:0; height:100vh; overflow:auto; }
  .side .brand { display:flex; align-items:center; gap:10px; padding:0 22px 18px; border-bottom:1px solid rgba(255,255,255,.1); margin-bottom:10px; }
  .side .brand img { height:34px; }
  .side .brand b { font-family:var(--serif); font-size:1.05rem; }
  .side .lang { display:flex; gap:6px; padding:0 22px 14px; }
  .side .lang button { flex:1; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.15); border-radius:20px; padding:5px 0; cursor:pointer; font-family:var(--sans); font-size:.72rem; color:rgba(247,243,236,.7); }
  .side .lang button.active { background:var(--gold); color:#fff; border-color:var(--gold); }
  .side nav a { display:flex; align-items:center; gap:10px; padding:12px 22px; color:rgba(247,243,236,.75); font-size:.9rem; cursor:pointer; border-left:3px solid transparent; }
  .side nav a:hover { background:rgba(255,255,255,.05); color:#fff; }
  .side nav a.active { background:rgba(176,141,73,.18); border-left-color:var(--gold); color:#fff; }
  .side nav a .badge { margin-left:auto; background:var(--gold); color:#fff; font-size:.7rem; border-radius:20px; padding:1px 8px; }
  .side .signout { margin:18px 22px 0; width:calc(100% - 44px); text-align:center; background:transparent; border:1px solid var(--gold); color:var(--gold); border-radius:var(--radius); padding:10px 0; cursor:pointer; font-family:var(--sans); font-size:.8rem; letter-spacing:.12em; text-transform:uppercase; transition:all .2s; }
  .side .signout:hover { background:var(--gold); color:#fff; }
  .side .me { padding:14px 22px 0; font-size:.78rem; color:rgba(247,243,236,.55); }
  .side .me b { color:var(--gold); text-transform:capitalize; }

  .main { padding:30px 34px; }
  .main h2.module-title { font-size:1.7rem; margin:0 0 22px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; }
  .scard { background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:22px 24px; }
  .scard .n { font-family:var(--serif); font-size:2.4rem; color:var(--gold-deep); line-height:1; }
  .scard .l { font-size:.82rem; color:var(--ink-soft); margin-top:8px; letter-spacing:.04em; }

  .controls { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:18px; }
  .controls select, .controls input[type="search"] { padding:9px 12px; border:1px solid var(--line); border-radius:var(--radius); font-family:var(--sans); font-size:.9rem; background:#fff; }
  .controls .count { margin-left:auto; color:var(--ink-soft); font-size:.85rem; }

  .sub-list { display:grid; gap:14px; }
  .card2 { background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:20px 22px; border-left:4px solid var(--line); }
  .st-new,.st-open,.st-pending { border-left-color:var(--gold)!important; }
  .st-in_progress,.st-claimed,.st-assigned { border-left-color:#5b8aa6!important; }
  .st-contacted,.st-done,.st-approved { border-left-color:#8aa17c!important; }
  .st-question_only { border-left-color:#7a8cb0!important; }
  .st-not_proceeding { border-left-color:#b08a8a!important; }
  .st-closed,.st-cancelled,.st-declined { border-left-color:#b0a89a!important; opacity:.75; }
  .c-top { display:flex; justify-content:space-between; gap:14px; flex-wrap:wrap; align-items:baseline; }
  .c-name { font-family:var(--serif); font-size:1.35rem; color:var(--ink); }
  .c-date { color:var(--ink-soft); font-size:.82rem; }
  .c-meta { display:flex; gap:22px; flex-wrap:wrap; margin:12px 0; font-size:.92rem; }
  .c-meta .lbl { color:var(--gold-deep); font-size:.66rem; letter-spacing:.13em; text-transform:uppercase; display:block; margin-bottom:2px; }
  .c-meta a { color:var(--ink); }
  .c-msg { background:var(--cream); border-radius:var(--radius); padding:12px 14px; font-size:.93rem; color:var(--ink-soft); margin:10px 0 16px; white-space:pre-wrap; }
  .c-actions { display:flex; gap:10px; flex-wrap:wrap; align-items:center; border-top:1px solid var(--line); padding-top:14px; }
  .c-actions select, .c-actions input { padding:8px 11px; border:1px solid var(--line); border-radius:var(--radius); font-family:var(--sans); font-size:.85rem; background:#fff; }
  .saved { color:#8aa17c; font-size:.82rem; opacity:0; transition:opacity .2s; }
  .saved.show { opacity:1; }
  .pill { font-size:.64rem; letter-spacing:.1em; text-transform:uppercase; padding:4px 10px; border-radius:30px; font-family:var(--sans); background:#eee; color:#555; }
  .pill.st-new,.pill.st-open,.pill.st-pending { background:#f3e6c8; color:#927235; }
  .pill.st-in_progress,.pill.st-claimed,.pill.st-assigned { background:#dce8ef; color:#3f6b85; }
  .pill.st-contacted,.pill.st-done,.pill.st-approved { background:#dfe9d6; color:#5a7448; }
  .pill.st-question_only { background:#dde2ef; color:#46557e; }
  .pill.st-not_proceeding { background:#efdddd; color:#8a4646; }
  .pill.st-closed,.pill.st-cancelled,.pill.st-declined { background:#e8e3da; color:#6e6457; }
  .empty { text-align:center; color:var(--ink-soft); padding:50px 0; }
  .tbtn { font-size:.8rem; padding:8px 16px; }
  .pay { font-family:var(--serif); font-size:1.05rem; color:var(--gold-deep); }
  table.roster { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  table.roster th, table.roster td { text-align:left; padding:13px 16px; border-bottom:1px solid var(--line); font-size:.92rem; }
  table.roster th { background:var(--cream); font-weight:400; font-size:.72rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); }
  table.roster tr:last-child td { border-bottom:none; }
  .rolechip { font-size:.68rem; letter-spacing:.08em; text-transform:uppercase; padding:3px 10px; border-radius:20px; background:#efe7d6; color:#927235; }
  .job-form { background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:24px; margin-bottom:22px; display:none; }
  .job-form.open { display:block; }
  .job-form h3 { margin:0 0 16px; font-size:1.3rem; }
  .jf-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .job-form label { display:block; font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:5px; }
  .job-form input, .job-form select, .job-form textarea { width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:var(--radius); font-family:var(--sans); font-size:.9rem; }
  .job-form .full { grid-column:1 / -1; }
  .postto { display:flex; gap:18px; align-items:center; }
  .postto label { display:flex; align-items:center; gap:7px; text-transform:none; letter-spacing:0; font-size:.9rem; margin:0; color:var(--ink); }
  .postto input { width:auto; }
  .cater-only { display:none; } .cater-only.show { display:block; }
  /* Checklist / CRM progress */
  .clist { margin:14px 0 4px; border-top:1px solid var(--line); padding-top:14px; }
  .clist h4 { margin:0 0 10px; font-size:.95rem; letter-spacing:.03em; color:var(--ink); display:flex; align-items:center; gap:10px; }
  .progress-wrap { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .progress-bar { flex:1; height:12px; background:var(--cream-deep); border-radius:20px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--gold); transition:width .3s; }
  .progress-pct { font-size:.82rem; color:var(--gold-deep); font-family:var(--serif); min-width:42px; text-align:right; }
  .check { display:flex; align-items:center; gap:10px; padding:6px 0; font-size:.9rem; }
  .check input[type=checkbox] { width:17px; height:17px; accent-color:var(--gold); cursor:pointer; flex-shrink:0; }
  .check.done .ctext { text-decoration:line-through; color:var(--ink-soft); }
  .check .ctext { flex:1; }
  .check .cx { color:#b08a8a; cursor:pointer; font-size:.8rem; opacity:.6; }
  .check .cx:hover { opacity:1; }
  .clist-add { display:flex; gap:8px; margin-top:10px; }
  .clist-add input { flex:1; padding:7px 10px; border:1px solid var(--line); border-radius:var(--radius); font-family:var(--sans); font-size:.85rem; }
  .clist-toggle { background:none; border:none; color:var(--gold-deep); cursor:pointer; font-family:var(--sans); font-size:.82rem; padding:4px 0; }
  .hide { display:none!important; }
  @media (max-width:820px){ .hub{grid-template-columns:1fr;} .side{position:relative;height:auto;} .jf-grid{grid-template-columns:1fr;} }
</style>

  function boot(){
    sb.auth.getSession().then(function(res){
      if(!res.data||!res.data.session){ showLogin(); return; }
      ME.id=res.data.session.user.id;
      sb.from("profiles").select("role, full_name, can_manage_intake, can_manage_finances, can_manage_reviews, can_manage_staff").eq("id",ME.id).single().then(function(p){
        if(p.error||!p.data){ ME.role="none"; ME.name=res.data.session.user.email; ME.can_manage_intake=false; }
        else { ME.role=p.data.role; ME.name=p.data.full_name||res.data.session.user.email;
               ME.can_manage_intake=p.data.can_manage_intake===true;
               ME.can_manage_finances=p.data.can_manage_finances===true;
               ME.can_manage_reviews=p.data.can_manage_reviews===true;
               ME.can_manage_staff=p.data.can_manage_staff===true; }
        showHub(); buildNav(); loadAll(); startRealtime();
      });
    });
  }

  // ---- LIVE UPDATES: quietly reload data when the database changes ----
  var _rtChannel=null, _rtTimer=null;
  function isEditing(){
    var a=document.activeElement;
    if(!a) return false;
    var tag=(a.tagName||"").toLowerCase();
    return tag==="input" || tag==="textarea" || tag==="select";
  }
  function scheduleReload(){
    // debounce bursts of changes; don't interrupt someone mid-typing
    if(_rtTimer) clearTimeout(_rtTimer);
    _rtTimer=setTimeout(function reload(){
      if(isEditing()){ _rtTimer=setTimeout(reload, 4000); return; } // wait until they finish
      loadAllQuiet();
    }, 1200);
  }
  function startRealtime(){
    if(!sb.channel){ return; } // older SDKs: silently skip
    try{
      if(_rtChannel){ sb.removeChannel(_rtChannel); _rtChannel=null; }
      _rtChannel=sb.channel("hdv-live")
        .on("postgres_changes",{event:"*",schema:"public",table:"contact_submissions"},scheduleReload)
        .on("postgres_changes",{event:"*",schema:"public",table:"jobs"},scheduleReload)
        .on("postgres_changes",{event:"*",schema:"public",table:"applications"},scheduleReload)
        .on("postgres_changes",{event:"*",schema:"public",table:"coordination_files"},scheduleReload)
        .on("postgres_changes",{event:"*",schema:"public",table:"reviews"},scheduleReload)
        .on("postgres_changes",{event:"*",schema:"public",table:"notes"},scheduleReload)
        .on("postgres_changes",{event:"*",schema:"public",table:"board_cards"},scheduleReload)
        .on("postgres_changes",{event:"*",schema:"public",table:"booking_slots"},scheduleReload)
        .on("postgres_changes",{event:"*",schema:"public",table:"booking_requests"},scheduleReload)
        .on("postgres_changes",{event:"*",schema:"public",table:"family_timeline_events"},scheduleReload)
        .on("postgres_changes",{event:"*",schema:"public",table:"family_messages"},scheduleReload)
        .subscribe();
    }catch(e){ /* realtime optional; ignore */ }
  }

  function _doLoad(quiet){
    var jobs_src=isAdmin()?"jobs":"jobs_safe";
    var q=[];
    q.push(seesInquiries()? sb.from("contact_submissions").select("*").order("created_at",{ascending:false}) : Promise.resolve({data:[]}));
    q.push(sb.from(jobs_src).select("*").order("created_at",{ascending:false}));
    q.push((isAdmin()||isStaff())? sb.from("roster").select("*") : Promise.resolve({data:[]}));
    q.push(isAdmin()? sb.from("applications").select("*").order("created_at",{ascending:false}) : Promise.resolve({data:[]}));
    q.push((isAdmin()||isStaff())? sb.from("job_checklist_items").select("*").order("position",{ascending:true}) : Promise.resolve({data:[]}));
    q.push(isAdmin()? sb.from("archive").select("*").order("archived_at",{ascending:false}) : Promise.resolve({data:[]}));
    q.push((isAdmin()||isStaff())? sb.from("coordination_files").select("*").order("created_at",{ascending:false}) : Promise.resolve({data:[]}));
    q.push((isAdmin()||isStaff())? sb.from("notes").select("*").order("created_at",{ascending:true}) : Promise.resolve({data:[]}));
    q.push(canReviews()? sb.from("reviews").select("*").order("created_at",{ascending:false}) : Promise.resolve({data:[]}));
    q.push((isAdmin()||isStaff())? sb.from("package_templates").select("*").order("position",{ascending:true}) : Promise.resolve({data:[]}));
    q.push(canFinances()? sb.from("invoices").select("*").order("created_at",{ascending:false}) : Promise.resolve({data:[]}));
    q.push(canFinances()? sb.from("invoice_items").select("*").order("position",{ascending:true}) : Promise.resolve({data:[]}));
    q.push(canFinances()? sb.from("payments").select("*").order("paid_at",{ascending:true}) : Promise.resolve({data:[]}));
    q.push(canFinances()? sb.from("expenses").select("*").order("spent_on",{ascending:false}) : Promise.resolve({data:[]}));
    q.push((isAdmin()||isStaff())? sb.from("family_documents").select("*").order("created_at",{ascending:false}) : Promise.resolve({data:[]}));
    q.push((isAdmin()||isStaff())? sb.from("board_cards").select("*").order("position",{ascending:true}) : Promise.resolve({data:[]}));
    q.push((isAdmin()||isStaff())? sb.from("booking_slots").select("*").order("slot_date",{ascending:true}).order("start_time",{ascending:true}) : Promise.resolve({data:[]}));
    q.push((isAdmin()||isStaff())? sb.from("booking_requests").select("*").order("created_at",{ascending:false}) : Promise.resolve({data:[]}));
    q.push((isAdmin()||isStaff())? sb.from("family_timeline_events").select("*").order("position",{ascending:true}) : Promise.resolve({data:[]}));
    q.push((isAdmin()||isStaff())? sb.from("family_messages").select("*").order("created_at",{ascending:true}) : Promise.resolve({data:[]}));
    Promise.all(q).then(function(r){
      DATA.inquiries=(r[0]&&r[0].data)||[]; DATA.jobs=(r[1]&&r[1].data)||[];
      DATA.roster=(r[2]&&r[2].data)||[]; DATA.applications=(r[3]&&r[3].data)||[];
      DATA.checklist=(r[4]&&r[4].data)||[]; DATA.archive=(r[5]&&r[5].data)||[];
      DATA.coordination=(r[6]&&r[6].data)||[]; DATA.notes=(r[7]&&r[7].data)||[];
      DATA.reviews=(r[8]&&r[8].data)||[]; DATA.templates=(r[9]&&r[9].data)||[];
      DATA.invoices=(r[10]&&r[10].data)||[]; DATA.invoiceItems=(r[11]&&r[11].data)||[]; DATA.payments=(r[12]&&r[12].data)||[];
      DATA.expenses=(r[13]&&r[13].data)||[]; DATA.documents=(r[14]&&r[14].data)||[];
      DATA.board=(r[15]&&r[15].data)||[];
      DATA.bookingSlots=(r[16]&&r[16].data)||[]; DATA.bookingRequests=(r[17]&&r[17].data)||[];
      DATA.timelineEvents=(r[18]&&r[18].data)||[];
      DATA.messages=(r[19]&&r[19].data)||[];
      if(quiet){
        // Don't yank someone out of an open intake file or mid-edit.
        if(openFileId || isEditing()){ buildNav(); return; }
        var y=window.scrollY;
        buildNav(); render();
        window.scrollTo(0,y);
      } else {
        buildNav(); render();
      }
    });

  function inquiryToFamilyFile(inqId){
    var inq=DATA.inquiries.filter(function(r){return String(r.id)===String(inqId);})[0]; if(!inq) return;
    // Pre-fill the intake contact section from the inquiry.
    var intake={};
    if(inq.name) intake.contact_name=inq.name;
    if(inq.phone) intake.contact_phone=inq.phone;
    if(inq.email) intake.contact_email=inq.email;
    if(inq.lang){ intake.contact_language = (inq.lang==="fr"?"fr":inq.lang==="en"?"en":"other"); }
    if(inq.message) intake.contact_notes_from_inquiry=inq.message; // preserved for reference
    var rec={ family_name:inq.name||"—", primary_contact:inq.name||null, phone:inq.phone||null, email:inq.email||null,
              source_submission:inq.id, status:"active", intake:intake };
    sb.from("coordination_files").insert(rec).select().single().then(function(res){
      if(res.error){ alert("Erreur / Error: "+res.error.message); return; }
      // mark the inquiry as in progress
      sb.from("contact_submissions").update({status:"in_progress"}).eq("id",inq.id).then(function(){});
      flashMsg(t("familyFileCreated"));
      // jump to the new family file's intake
      DATA.coordination.unshift(res.data);

  }

  function wireChecklists(){
    // toggle done
    document.querySelectorAll("[data-check]").forEach(function(cb){
      cb.addEventListener("change", function(){
        var id=cb.getAttribute("data-check");
        sb.from("job_checklist_items").update({ done:cb.checked, done_by:cb.checked?ME.name:null, done_at:cb.checked?new Date().toISOString():null }).eq("id",id).then(function(res){
          if(res.error){ alert(res.error.message); cb.checked=!cb.checked; return; }
          var it=DATA.checklist.filter(function(x){return String(x.id)===String(id);})[0]; if(it){ it.done=cb.checked; }
          drawJobs();
        });
      });
    });
    // add step (to this client's job, optionally also to the master template)
    function addStepFor(jobId){
      var input=document.querySelector('[data-addstep="'+jobId+'"]'); if(!input) return;
      var text=input.value.trim(); if(!text) return;
      var scopeSel=document.querySelector('[data-addscope="'+jobId+'"]');
      var alsoMaster = scopeSel && scopeSel.value==="master";
      var job=DATA.jobs.filter(function(x){return String(x.id)===String(jobId);})[0];
      var items=jobItems(jobId); var nextPos=items.length? Math.max.apply(null,items.map(function(i){return i.position||0;}))+1 : 1;
      sb.from("job_checklist_items").insert({ job_id:jobId, position:nextPos, task_fr:text, task_en:text, done:false }).then(function(res){
        if(res.error){ alert(res.error.message); return; }
        // Also add to the package master template, if chosen and job has a package.
        if(alsoMaster && job && job.package_key){
          var tItems=(DATA.templates||[]).filter(function(x){return x.package_key===job.package_key;});
          var maxPos=tItems.length?Math.max.apply(null,tItems.map(function(i){return i.position||0;})):0;
          sb.from("package_templates").insert({package_key:job.package_key,position:maxPos+1,task_fr:text,task_en:text}).then(function(){ loadAll(); });
        } else {
          loadAll();
        }
      });
    }
    document.querySelectorAll("[data-addstepbtn]").forEach(function(b){ b.addEventListener("click", function(){ addStepFor(b.getAttribute("data-addstepbtn")); }); });
    document.querySelectorAll("[data-addstep]").forEach(function(i){ i.addEventListener("keydown", function(e){ if(e.key==="Enter") addStepFor(i.getAttribute("data-addstep")); }); });
    // remove step (admin)
    document.querySelectorAll("[data-rmstep]").forEach(function(x){ x.addEventListener("click", function(){
      if(!confirm(t("removeStepConfirm"))) return;
      var id=x.getAttribute("data-rmstep");

  // ================= FINANCES / INVOICES (Phase 1) =================
  function money(n){ return "$"+(Math.round((n||0)*100)/100).toFixed(2); }
  function invItems(invId){ return (DATA.invoiceItems||[]).filter(function(x){return String(x.invoice_id)===String(invId);}).sort(function(a,b){return (a.position||0)-(b.position||0);}); }
  function invPayments(invId){ return (DATA.payments||[]).filter(function(x){return String(x.invoice_id)===String(invId);}); }
  function invTotals(inv){
    var items=invItems(inv.id);
    var subtotal=items.reduce(function(s,it){ return s + (Number(it.quantity)||0)*(Number(it.unit_price)||0); },0);
    var gst = inv.apply_gst ? subtotal*(Number(inv.gst_rate)||0)/100 : 0;
    var qst = inv.apply_qst ? subtotal*(Number(inv.qst_rate)||0)/100 : 0;  // QST on subtotal only (not compounded)
    var total = subtotal + gst + qst;
    var paid = invPayments(inv.id).reduce(function(s,p){ return s + (Number(p.amount)||0); },0);
    return { subtotal:subtotal, gst:gst, qst:qst, total:total, paid:paid, balance: total - paid };
  }

  function periodRange(){
    var now=new Date(); var y=now.getFullYear();
    if(finPeriod==="month"){ var f=new Date(y,now.getMonth(),1); return [f.toISOString().slice(0,10), new Date(y,now.getMonth()+1,0).toISOString().slice(0,10)]; }
    if(finPeriod==="year"){ return [y+"-01-01", y+"-12-31"]; }
    if(finPeriod==="custom"){ return [finFrom||"1900-01-01", finTo||"2999-12-31"]; }
    return ["1900-01-01","2999-12-31"]; // all time
  }
  function inRange(d, lo, hi){ if(!d) return false; var s=String(d).slice(0,10); return s>=lo && s<=hi; }

  function renderFinancesOverview(m, tabs){
    var r=periodRange(), lo=r[0], hi=r[1];
    // income = payments received in range
    var income=(DATA.payments||[]).filter(function(p){return inRange(p.paid_at,lo,hi);}).reduce(function(s,p){return s+(Number(p.amount)||0);},0);
    // expenses in range
    var exps=(DATA.expenses||[]).filter(function(e){return inRange(e.spent_on,lo,hi);});
    var expTotal=exps.reduce(function(s,e){return s+(Number(e.amount)||0);},0);
    var net=income-expTotal;
    // outstanding = unpaid balance across all invoices (not period-bound)
    var outstanding=(DATA.invoices||[]).reduce(function(s,inv){ var tt=invTotals(inv); return s + (tt.balance>0?tt.balance:0); },0);
    // expenses by category
    var byCat={};
    exps.forEach(function(e){ var c=e.category||"other"; byCat[c]=(byCat[c]||0)+(Number(e.amount)||0); });

    var periodSel='<select id="fin_period">'
      +'<option value="month"'+(finPeriod==="month"?" selected":"")+'>'+esc(t("thisMonth"))+'</option>'
      +'<option value="year"'+(finPeriod==="year"?" selected":"")+'>'+esc(t("thisYear"))+'</option>'
      +'<option value="all"'+(finPeriod==="all"?" selected":"")+'>'+esc(t("allTime"))+'</option>'
      +'<option value="custom"'+(finPeriod==="custom"?" selected":"")+'>'+esc(t("custom"))+'</option>'
      +'</select>';
    var customRange = finPeriod==="custom"
      ? '<span style="margin-left:10px">'+esc(t("from"))+' <input type="date" id="fin_from" value="'+esc(finFrom||"")+'"> '+esc(t("to"))+' <input type="date" id="fin_to" value="'+esc(finTo||"")+'"></span>'

    function statCard(label, val, color){

        +'<div style="font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px">'+esc(label)+'</div>'
        +'<div style="font-family:var(--serif);font-size:1.7rem;color:'+(color||"var(--ink)")+'">'+money(val)+'</div></div>';
    }

    var catRows=Object.keys(byCat).sort(function(a,b){return byCat[b]-byCat[a];}).map(function(c){
      var pct= expTotal>0? Math.round(byCat[c]*100/expTotal):0;
      return '<div style="margin:6px 0"><div style="display:flex;justify-content:space-between;font-size:.88rem"><span>'+esc(t("cat_"+c)||c)+'</span><span>'+money(byCat[c])+' ('+pct+'%)</span></div>'
        +'<div style="height:8px;background:var(--cream-deep);border-radius:20px;overflow:hidden;margin-top:3px"><div style="height:100%;width:'+pct+'%;background:var(--gold)"></div></div></div>';
    }).join('') || '<div style="font-size:.85rem;color:var(--ink-soft)">'+esc(t("noData"))+'</div>';

    m.innerHTML='<h2 class="module-title">'+esc(t("finances"))+'</h2>'+tabs
      +'<div class="controls"><label style="font-size:.85rem;color:var(--ink-soft);margin-right:8px">'+esc(t("period"))+'</label>'+periodSel+customRange
      +'<button class="btn btn--ghost tbtn" id="ovExport" style="margin-left:auto">'+esc(t("exportOverview"))+'</button></div>'
      +'<div style="display:flex;gap:14px;flex-wrap:wrap;margin:8px 0 22px">'
        +statCard(t("income"), income, "#5a7448")
        +statCard(t("expensesTotal"), expTotal, "#a8402d")
        +statCard(t("net"), net, net>=0?"#5a7448":"#a8402d")
        +statCard(t("outstanding"), outstanding, "#8a6d1f")
      +'</div>'
      +'<div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:18px 20px;max-width:520px"><h4 style="margin:0 0 12px">'+esc(t("byCategory"))+'</h4>'+catRows+'</div>';

    document.querySelectorAll("[data-ftab]").forEach(function(b){ b.addEventListener("click",function(){ financeTab=b.getAttribute("data-ftab"); render(); }); });

    var ff=document.getElementById("fin_from"); if(ff) ff.addEventListener("change",function(e){ finFrom=e.target.value; render(); });
    var ft=document.getElementById("fin_to"); if(ft) ft.addEventListener("change",function(e){ finTo=e.target.value; render(); });
    document.getElementById("ovExport").addEventListener("click",function(){
      try{
        var rowsData=[
          { Poste:t("income"), Montant:income },
          { Poste:t("expensesTotal"), Montant:expTotal },
          { Poste:t("net"), Montant:net },
          { Poste:t("outstanding"), Montant:outstanding }

        Object.keys(byCat).forEach(function(c){ rowsData.push({ Poste:(t("cat_"+c)||c), Montant:byCat[c] }); });

    });
  }

    // edit wording
    document.querySelectorAll("[data-tpl-save]").forEach(function(b){ b.addEventListener("click",function(){

    document.getElementById("tplAddBtn").addEventListener("click",function(){

    // drag and drop reorder
    var dragEl=null;

    });
    function getDragAfter(container,y){
      var els=[].slice.call(container.querySelectorAll(".tpl-row:not([style*='opacity: 0.4'])"));
      return els.reduce(function(closest,child){ var box=child.getBoundingClientRect(); var offset=y-box.top-box.height/2; if(offset<0&&offset>closest.offset){ return {offset:offset,element:child}; } else { return closest; } },{offset:-Infinity}).element;

    function persistOrder(){

  // ---- AUTHORED NOTE THREADS (locked to author) ----
  function notesFor(parentType, parentId, sectionKey){
    return (DATA.notes||[]).filter(function(n){
      if(n.parent_type!==parentType) return false;
      if(String(n.parent_id)!==String(parentId)) return false;
      if(sectionKey!=null && n.section_key!==sectionKey) return false;
      if(sectionKey==null && n.section_key) return false;
      return true;
    });
  }
  function noteThreadHTML(parentType, parentId, sectionKey){

    var h='<div class="clist" style="margin-top:12px"><h4>'+esc(t("notesThread"))+'</h4>';
    if(list.length){
      h+=list.map(function(n){
        var mine=(n.author_id===ME.id);
        return '<div style="padding:8px 0;border-bottom:1px solid var(--cream-deep)">'
          +'<div style="font-size:.72rem;color:var(--gold-deep);margin-bottom:3px"><b>'+esc(n.author_name||"—")+'</b> · '+esc(fmtDate(n.created_at))+(n.updated_at&&n.updated_at!==n.created_at?' ('+esc(LANG==="fr"?"modifié":"edited")+')':'')+'</div>'
          +(mine
              ? '<textarea data-editnote="'+esc(n.id)+'" rows="2" style="width:100%;padding:7px 10px;border:1px solid var(--line);border-radius:var(--radius);font-family:var(--sans);font-size:.9rem">'+esc(n.body)+'</textarea><button class="btn btn--ghost tbtn" data-savenote="'+esc(n.id)+'" style="margin-top:5px">'+esc(t("saveNote"))+'</button>'

    var cols=BOARD_COLS.map(function(c){
      var cards=(DATA.board||[]).filter(function(x){return x.column_key===c[0];}).sort(function(a,b){return (a.position||0)-(b.position||0);});
      var cardsHtml=cards.map(function(card){
        return '<div class="bcard" draggable="true" data-cardid="'+esc(card.id)+'" style="background:'+(card.color||"#fff")+';border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:grab;box-shadow:0 1px 3px rgba(0,0,0,.06)">'
          +'<div contenteditable="true" data-cardbody="'+esc(card.id)+'" style="font-size:.9rem;outline:none;min-height:20px">'+esc(card.body)+'</div>'
          +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">'

          +'</div>';

      return '<div class="bcol" data-col="'+c[0]+'" style="flex:1;min-width:240px;background:var(--cream-deep,#efe9dd);border-radius:12px;padding:12px">'
        +'<h3 style="margin:0 0 10px;font-size:1rem">'+esc(t(c[1]))+' <span style="color:var(--ink-soft);font-size:.8rem">('+cards.length+')</span></h3>'
        +'<div class="bcol-cards" data-colcards="'+c[0]+'" style="min-height:40px">'+cardsHtml+'</div>'
        +'<div class="clist-add" style="margin-top:8px"><input type="text" data-newcard="'+c[0]+'" placeholder="'+esc(t("newCardText"))+'" style="flex:1"><button class="btn btn--ghost tbtn" data-addcard="'+c[0]+'">+</button></div>'
        +'</div>';
    }).join('');
    m.innerHTML='<h2 class="module-title">'+esc(t("board"))+'</h2>'
      +'<div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start">'+cols+'</div>';

    // add card
    document.querySelectorAll("[data-addcard]").forEach(function(b){ b.addEventListener("click",function(){ addBoardCard(b.getAttribute("data-addcard")); }); });
    document.querySelectorAll("[data-newcard]").forEach(function(i){ i.addEventListener("keydown",function(e){ if(e.key==="Enter") addBoardCard(i.getAttribute("data-newcard")); }); });
    // edit card body (on blur)
    document.querySelectorAll("[data-cardbody]").forEach(function(el){ el.addEventListener("blur",function(){
      var id=el.getAttribute("data-cardbody"); var body=el.innerText.trim();
      var card=(DATA.board||[]).filter(function(x){return String(x.id)===String(id);})[0];
      if(card && card.body!==body){ sb.from("board_cards").update({body:body}).eq("id",id).then(function(){ card.body=body; }); }
    }); });
    // delete
    document.querySelectorAll("[data-delcard]").forEach(function(x){ x.addEventListener("click",function(){
      sb.from("board_cards").delete().eq("id",x.getAttribute("data-delcard")).then(function(){ loadAll(); });
    }); });
    // drag & drop between columns
    var dragId=null;
    document.querySelectorAll(".bcard").forEach(function(card){
      card.addEventListener("dragstart",function(e){ dragId=card.getAttribute("data-cardid"); card.style.opacity="0.4"; });
      card.addEventListener("dragend",function(){ card.style.opacity="1"; });
    });
    document.querySelectorAll(".bcol-cards").forEach(function(zone){
      zone.addEventListener("dragover",function(e){ e.preventDefault(); });
      zone.addEventListener("drop",function(e){
        e.preventDefault(); if(!dragId) return;
        var newCol=zone.getAttribute("data-colcards");
        var count=(DATA.board||[]).filter(function(x){return x.column_key===newCol;}).length;
        sb.from("board_cards").update({column_key:newCol, position:count}).eq("id",dragId).then(function(){ loadAll(); });
        dragId=null;
      });
    });
  }
  function addBoardCard(col){
    var input=document.querySelector('[data-newcard="'+col+'"]'); if(!input) return;
    var body=input.value.trim(); if(!body) return;
    var count=(DATA.board||[]).filter(function(x){return x.column_key===col;}).length;
    sb.from("board_cards").insert({column_key:col, position:count, body:body, created_by:ME.name}).then(function(res){ if(res.error){alert(res.error.message);return;} loadAll(); });
  }

  function slotLabel(slot){
    if(!slot) return "—";
    return slot.slot_date+" · "+slot.start_time.slice(0,5)+"–"+slot.end_time.slice(0,5);
  }

  function renderBookingRequests(m){
    var rows=(DATA.bookingRequests||[]).slice().sort(function(a,b){
      var order={pending:0,confirmed:1,completed:2,cancelled:3};
      var oa=order[a.status]==null?9:order[a.status], ob=order[b.status]==null?9:order[b.status];
      if(oa!==ob) return oa-ob;
      return new Date(b.created_at)-new Date(a.created_at);
    });
    if(!rows.length){ m.innerHTML='<p style="color:var(--ink-soft)">'+esc(t("bookingNoRequests"))+'</p>'; return; }
    var statusLabel={pending:t("bookingStatusPending"),confirmed:t("bookingStatusConfirmed"),cancelled:t("bookingStatusCancelled"),completed:t("bookingStatusCompleted")};
    var statusColor={pending:"#b8860b",confirmed:"#3d7a4d",cancelled:"#a8402d",completed:"#666"};
    var html='<div style="display:flex;flex-direction:column;gap:10px">';
    rows.forEach(function(r){
      var slot=(DATA.bookingSlots||[]).filter(function(s){return String(s.id)===String(r.slot_id);})[0];
      html+='<div style="border:1px solid var(--line);border-radius:8px;padding:16px 18px;background:#fff">'
        +'<div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;align-items:flex-start">'
        +'<div>'
        +'<div style="font-weight:600">'+esc(r.family_name)+' <span style="font-weight:400;color:var(--ink-soft);font-size:.85rem">— '+esc(slotLabel(slot))+' · '+esc(staffName(slot&&slot.staff_id)||t("bookingUnassignedStaff"))+'</span></div>'
        +'<div style="font-size:.85rem;color:var(--ink-soft);margin-top:4px">'+esc(r.phone)+(r.email?' · '+esc(r.email):'')+'</div>'
        +(r.reason?'<div style="font-size:.88rem;margin-top:8px">'+esc(r.reason)+'</div>':'')
        +'</div>'
        +'<span style="font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:'+statusColor[r.status]+';white-space:nowrap">'+esc(statusLabel[r.status]||r.status)+'</span>'
        +'</div>'
        +'<div style="display:flex;gap:8px;margin-top:12px">'
        +(r.status==="pending"?'<button class="btn btn--ghost tbtn" data-bconfirm="'+r.id+'">'+esc(t("bookingConfirm"))+'</button>':'')
        +(r.status==="pending"||r.status==="confirmed"?'<button class="btn btn--ghost tbtn" data-bcancel="'+r.id+'">'+esc(t("bookingCancel"))+'</button>':'')
        +(r.status==="confirmed"?'<button class="btn btn--ghost tbtn" data-bcomplete="'+r.id+'">'+esc(t("bookingComplete"))+'</button>':'')
        +'</div>'

    document.querySelectorAll("[data-bcomplete]").forEach(function(b){ b.addEventListener("click",function(){ completeBookingRequest(b.getAttribute("data-bcomplete")); }); });
  }

  function confirmBookingRequest(id){
    sb.from("booking_requests").update({status:"confirmed", confirmed_by:ME.id, confirmed_at:new Date().toISOString()}).eq("id",id)
      .then(function(res){ if(res.error){alert(res.error.message);return;} loadAll(); });
  }
  function completeBookingRequest(id){
    sb.from("booking_requests").update({status:"completed"}).eq("id",id)
      .then(function(res){ if(res.error){alert(res.error.message);return;} loadAll(); });

  function cancelBookingRequest(id){
    var req=(DATA.bookingRequests||[]).filter(function(x){return String(x.id)===String(id);})[0];

      : "Delete "+scopedOpen.length+" open slot(s) for "+who+"? Already-booked slots will NOT be touched. Type YES to confirm.");

    // Delete by filter (not by ID list) — a year's worth of slots can be thousands

    var q=sb.from("booking_slots").delete().eq("status","open");

  function generateBookingSlots(){
    var staffId=document.getElementById("bgenStaff").value;
    if(!staffId){ alert(t("bookingChooseStaffRequired")); return; }
    var from=document.getElementById("bgenFrom").value;
    var to=document.getElementById("bgenTo").value;
    var startT=document.getElementById("bgenStart").value;
    var endT=document.getElementById("bgenEnd").value;
    var duration=parseInt(document.getElementById("bgenDuration").value,10)||30;
    var days=[]; document.querySelectorAll("[data-bday]").forEach(function(cb){ if(cb.checked) days.push(cb.getAttribute("data-bday")); });
    if(!from||!to||!startT||!endT||!days.length){ alert(LANG==="fr"?"Veuillez remplir tous les champs.":"Please fill in all fields."); return; }

    var slots=[];
    var d=new Date(from+"T00:00:00");
    var end=new Date(to+"T00:00:00");
    while(d<=end){
      if(days.indexOf(String(d.getDay()))!==-1){
        var dateStr=d.toISOString().slice(0,10);
        var cursorMin=parseInt(startT.slice(0,2),10)*60+parseInt(startT.slice(3,5),10);
        var endMin=parseInt(endT.slice(0,2),10)*60+parseInt(endT.slice(3,5),10);
        while(cursorMin+duration<=endMin){
          var sh=String(Math.floor(cursorMin/60)).padStart(2,"0"), sm=String(cursorMin%60).padStart(2,"0");
          var em=cursorMin+duration;
          var eh2=String(Math.floor(em/60)).padStart(2,"0"), em2=String(em%60).padStart(2,"0");
          slots.push({slot_date:dateStr, start_time:sh+":"+sm+":00", end_time:eh2+":"+em2+":00", status:"open", created_by:ME.id, staff_id:staffId});
          cursorMin+=duration;
        }
      }
      d.setDate(d.getDate()+1);
    }
    if(!slots.length){ document.getElementById("bgenResult").textContent = LANG==="fr" ? "Aucun créneau à créer avec ces paramètres." : "No slots to create with these settings."; return; }
    sb.from("booking_slots").insert(slots).then(function(res){
      if(res.error){ alert(res.error.message); return; }
      document.getElementById("bgenResult").textContent = slots.length+" "+t("bookingGenerated");
      loadAll();
    });
  }

  function wireMessagesThread(fileId){

      var input=document.getElementById("msgReplyInput");
      var body=(input.value||"").trim();
      if(!body) return;
      btn.disabled=true;
      sb.from("family_messages").insert({coordination_id:fileId, sender_role:"staff", sender_name:ME.name, body:body, read_by_staff:true}).then(function(res){
        btn.disabled=false;
        if(res.error){ alert(res.error.message); return; }
        input.value="";
        loadAll();
      });
    }
    btn.addEventListener("click", send);
    document.getElementById("msgReplyInput").addEventListener("keydown", function(e){ if(e.key==="Enter") send(); });

  }

    var unread=(DATA.messages||[]).filter(function(x){ return String(x.coordination_id)===String(fileId) && x.sender_role==="family" && !x.read_by_staff; });
    if(!unread.length) return;
    var ids=unread.map(function(x){ return x.id; });
    sb.from("family_messages").update({read_by_staff:true}).in("id",ids).then(function(){ loadAllQuiet(); });
  }

  // ---- Portal access panel ----
  function portalAccessPanelHTML(f){
    var active = !!f.portal_user_id;
    var h='<div class="intake-section" style="margin-top:26px"><h3>🔑 '+esc(t("portalAccess"))+'</h3>';
    if(active){
      h+='<p style="font-size:.9rem;color:var(--ink)">'+esc(t("portalActiveSince"))+' '+esc(fmtDate(f.portal_created_at))+' ('+esc(f.portal_email||"")+')</p>'
        +'<button class="btn btn--ghost tbtn" id="portalRevoke" style="color:#a8402d">'+esc(t("portalRevoke"))+'</button>';
    } else {
      h+='<p style="font-size:.9rem;color:var(--ink-soft)">'+esc(t("portalNotSignedUp"))+'</p>';
    }
    h+='</div>';
    return h;
  }
  function wirePortalAccess(f){
    var btn=document.getElementById("portalRevoke");
    if(!btn) return;
    btn.addEventListener("click", function(){
      if(!confirm(t("portalRevokeConfirm"))) return;
      btn.disabled=true;
      sb.functions.invoke("portal-revoke", { body:{ coordination_id: f.id } }).then(function(res){
        btn.disabled=false;
        if(!res.data || !res.data.success){ alert((res.data&&res.data.error)||"Error"); return; }
        loadAll();
      });
    });

  // ---- Timeline panel ----
  function timelinePanelHTML(fileId, editable){
    var events=(DATA.timelineEvents||[]).filter(function(x){ return String(x.coordination_id)===String(fileId); });
    var statusLabel={pending:t("bookingStatusPending")||"Pending",in_progress:t("tlInProgress"),done:t("tlDone")};
    var h='<div class="intake-section" style="margin-top:26px"><h3>📅 '+esc(t("familyTimeline"))+'</h3>';
    if(events.length){
      h+='<div class="sub-list">'+events.map(function(ev){
        return '<div class="check" style="justify-content:space-between;align-items:center">'
          +'<span class="ctext">'+esc(ev.label)+(ev.event_date?' — '+esc(ev.event_date):'')+'</span>'
          +'<span style="display:flex;gap:6px;align-items:center">'
          +'<select data-tlstatus="'+esc(ev.id)+'">'
          +['pending','in_progress','done'].map(function(s){ return '<option value="'+s+'"'+(ev.status===s?' selected':'')+'>'+esc(statusLabel[s])+'</option>'; }).join('')
          +'</select>'
          +'<button class="btn btn--ghost tbtn" data-tldel="'+esc(ev.id)+'" style="color:#a8402d">'+esc(t("remove"))+'</button>'
          +'</span></div>';
      }).join('')+'</div>';
    } else {
      h+='<div style="font-size:.85rem;color:var(--ink-soft)">'+esc(t("noTimelineYet"))+'</div>';
    }
    if(editable){
      h+='<div class="clist-add" style="flex-wrap:wrap;gap:8px;margin-top:12px">'
        +'<input type="text" id="tl_label" placeholder="'+esc(t("tlLabelPlaceholder"))+'" style="flex:1;min-width:180px">'
        +'<input type="date" id="tl_date" style="width:150px">'
        +'<button class="btn btn--solid tbtn" id="tl_add">'+esc(t("addLink"))+'</button></div>';
    }
    h+='</div>';
    return h;
  }
  function wireTimeline(fileId, editable){
    document.querySelectorAll("[data-tlstatus]").forEach(function(sel){
      sel.addEventListener("change", function(){
        sb.from("family_timeline_events").update({status:sel.value}).eq("id",sel.getAttribute("data-tlstatus")).then(function(){ loadAllQuiet(); });
      });
    });
    document.querySelectorAll("[data-tldel]").forEach(function(b){
      b.addEventListener("click", function(){
        sb.from("family_timeline_events").delete().eq("id",b.getAttribute("data-tldel")).then(function(){ loadAll(); });
      });
    });
    var addBtn=document.getElementById("tl_add");
    if(addBtn){
      addBtn.addEventListener("click", function(){
        var label=(document.getElementById("tl_label").value||"").trim();
        if(!label) return;
        var date=document.getElementById("tl_date").value||null;
        var existing=(DATA.timelineEvents||[]).filter(function(x){ return String(x.coordination_id)===String(fileId); });
        var pos=existing.length;
        sb.from("family_timeline_events").insert({coordination_id:fileId,label:label,status:"pending",event_date:date,position:pos}).then(function(res){
          if(res.error){ alert(res.error.message); return; } loadAll();
        });
      });
    }
  }

  var DOC_TYPES=["death_certificate","will","contract","photo","id","marriage","military","other"];
  function documentsPanelHTML(fileId, editable){
    var docs=(DATA.documents||[]).filter(function(d){ return String(d.coordination_id)===String(fileId); });
    var typeOpts=DOC_TYPES.map(function(dt){ return '<option value="'+dt+'">'+esc(t("dt_"+dt))+'</option>'; }).join('');
    var h='<div class="intake-section" style="margin-top:10px"><h3>📄 '+esc(t("documentLinks"))+'</h3>'
      +'<p style="font-size:.85rem;color:var(--ink-soft);margin:0 0 12px">'+esc(t("documentLinksHint"))+'</p>';
    if(editable){
      h+='<div class="clist-add" style="flex-wrap:wrap;gap:8px;margin-bottom:12px">'
        +'<select id="doc_type">'+typeOpts+'</select>'
        +'<input type="text" id="doc_label" placeholder="'+esc(t("docLabelOptional"))+'" style="width:150px">'
        +'<input type="url" id="doc_url" placeholder="'+esc(t("pasteDriveLink"))+'" style="flex:1;min-width:220px">'
        +'<button class="btn btn--solid tbtn" id="doc_add">'+esc(t("addLink"))+'</button></div>';
    }
    if(docs.length){
      h+='<div class="sub-list">'+docs.map(function(d){
        var label=(d.label&&d.label.trim())? d.label : (t("dt_"+(d.doc_type||"other"))||d.doc_type);
        return '<div class="check" style="justify-content:space-between"><span class="ctext">📎 '+esc(t("dt_"+(d.doc_type||"other"))||d.doc_type)+(d.label&&d.label.trim()?' — '+esc(d.label):'')+'</span>'
          +'<span style="display:flex;gap:6px"><a class="btn btn--ghost tbtn" href="'+esc(d.drive_url||"#")+'" target="_blank" rel="noopener">'+esc(t("openDrive"))+'</a>'
          +(editable?'<button class="btn btn--ghost tbtn" data-deldoc="'+esc(d.id)+'" style="color:#a8402d">'+esc(t("remove"))+'</button>':'')+'</span></div>';
      }).join('')+'</div>';
    } else {
      h+='<div style="font-size:.85rem;color:var(--ink-soft)">'+esc(t("noDocLinks"))+'</div>';
    }
    h+='</div>';
    return h;
  }
  function wireDocuments(fileId){
    var add=document.getElementById("doc_add");
    if(add){ add.addEventListener("click",function(){
      var url=(document.getElementById("doc_url").value||"").trim();
      if(!url){ alert(t("pasteDriveLink")); return; }
      if(!/^https?:\/\//i.test(url)){ alert(t("invalidLink")); return; }
      var rec={ coordination_id:fileId, doc_type:document.getElementById("doc_type").value, label:(document.getElementById("doc_label").value||"").trim()||null, drive_url:url, added_by:ME.name };
      sb.from("family_documents").insert(rec).then(function(res){ if(res.error){ alert("Erreur / Error: "+res.error.message); return; } loadAll(); });
    }); }
    document.querySelectorAll("[data-deldoc]").forEach(function(b){ b.addEventListener("click",function(){
      if(!confirm(t("removeLinkConfirm"))) return;
      sb.from("family_documents").delete().eq("id",b.getAttribute("data-deldoc")).then(function(){ loadAll(); });
    }); });
  }

  function saveIntake(fileId){
    var answers={}, notes={}, prog={};
    document.querySelectorAll("[data-intake]").forEach(function(el){ var v=el.value.trim(); if(v) answers[el.getAttribute("data-intake")]=v; });
    document.querySelectorAll("[data-note]").forEach(function(el){ var v=el.value.trim(); if(v) notes[el.getAttribute("data-note")]=v; });
    document.querySelectorAll("[data-secdone]").forEach(function(el){ if(el.checked) prog[el.getAttribute("data-secdone")]=true; });
    sb.from("coordination_files").update({ intake:answers, intake_notes:notes, intake_progress:prog }).eq("id",fileId).then(function(res){
      if(res.error){ alert("Erreur / Error: "+res.error.message); return; }
      var f=(DATA.coordination||[]).filter(function(x){return String(x.id)===String(fileId);})[0];
      if(f){ f.intake=answers; f.intake_notes=notes; f.intake_progress=prog; }
      var s=document.getElementById("intakeSaved"); if(s){ s.classList.add("show"); setTimeout(function(){s.classList.remove("show");},1500); }
    });
  }

  // ---- Generate jobs from the intake "Services needed" answers ----
  var SERVICE_JOBS=[
    { key:"svc_photographer", job_type:"photographer", title:{fr:"Photographie",en:"Photography"} },
    { key:"svc_caterer",      job_type:"caterer",      title:{fr:"Traiteur",en:"Catering"} },
    { key:"svc_flowers",      job_type:"coordination", title:{fr:"Fleurs",en:"Flowers"} },
    { key:"svc_church",       job_type:"coordination", title:{fr:"Église / lieu de culte",en:"Church / place of worship"} },
    { key:"svc_transport",    job_type:"coordination", title:{fr:"Transport",en:"Transportation"} },
    { key:"svc_livestream",   job_type:"coordination", title:{fr:"Diffusion en direct",en:"Livestream"} },
    { key:"svc_programs",     job_type:"coordination", title:{fr:"Programmes imprimés",en:"Printed programs"} },
    { key:"svc_memorial",     job_type:"coordination", title:{fr:"Produits commémoratifs",en:"Memorial products"} },
    { key:"svc_reception",    job_type:"coordination", title:{fr:"Réception",en:"Reception"} },
    { key:"svc_obituary",     job_type:"coordination", title:{fr:"Nécrologie",en:"Obituary"} }
  ];
  function generateJobsFromIntake(fileId){
    // Read current on-screen answers (so unsaved checks count too).
    var answers={};
    document.querySelectorAll("[data-intake]").forEach(function(el){ var v=el.value.trim(); if(v) answers[el.getAttribute("data-intake")]=v; });
    var f=(DATA.coordination||[]).filter(function(x){return String(x.id)===String(fileId);})[0];
    var fam=f?f.family_name:"";
    var pkg=f?f.package_key:null;
    var wanted=SERVICE_JOBS.filter(function(s){ return answers[s.key]==="yes"; });
    if(!wanted.length){ alert(t("noServicesChecked")); return; }
    // warn if this family already has jobs
    var existing=(DATA.jobs||[]).filter(function(j){ return j.family_name===fam; });
    if(existing.length && !confirm(t("alreadyHasJobs"))) return;

    // Build a confirmation modal with a checkbox per wanted service.
    var ov=document.createElement("div");
    ov.style.cssText="position:fixed;inset:0;background:rgba(35,33,30,.5);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px";
    ov.innerHTML='<div style="background:#fff;border-radius:12px;max-width:440px;width:100%;padding:24px;max-height:80vh;overflow:auto">'
      +'<h3 style="margin:0 0 6px">'+esc(t("generateJobs"))+'</h3>'
      +'<p style="font-size:.9rem;color:var(--ink-soft);margin:0 0 14px">'+esc(t("confirmJobsIntro"))+'</p>'
      +wanted.map(function(s){ return '<label class="check" style="display:flex;align-items:center;gap:8px;padding:6px 0"><input type="checkbox" data-gensvc="'+esc(s.key)+'" checked> <span>'+esc(s.title[LANG]||s.title.fr)+' <span style="color:var(--ink-soft);font-size:.8rem">('+esc(s.job_type)+')</span></span></label>'; }).join('')
      +'<div style="display:flex;gap:10px;margin-top:18px"><button class="btn btn--solid tbtn" id="genConfirm">'+esc(t("createSelectedJobs"))+'</button><button class="btn btn--ghost tbtn" id="genCancel">'+esc(t("cancel"))+'</button></div>'
      +'</div>';
    document.body.appendChild(ov);
    document.getElementById("genCancel").addEventListener("click",function(){ ov.remove(); });
    document.getElementById("genConfirm").addEventListener("click",function(){
      var picked=[];
      ov.querySelectorAll("[data-gensvc]").forEach(function(cb){ if(cb.checked){ var s=SERVICE_JOBS.filter(function(x){return x.key===cb.getAttribute("data-gensvc");})[0]; if(s) picked.push(s); } });
      if(!picked.length){ ov.remove(); return; }
      var inserts=picked.map(function(s){
        return sb.from("jobs").insert({
          job_type:s.job_type,
          title:(s.title[LANG]||s.title.fr),
          family_name:fam,
          package_key:pkg,
          coordination_id:fileId,
          status:"open",
          details:(LANG==="fr"?"Généré depuis le dossier familial.":"Generated from the family file.")
        });
      });
      Promise.all(inserts).then(function(results){
        var errs=results.filter(function(r){return r.error;});
        ov.remove();
        if(errs.length){ alert("Erreur / Error: "+errs[0].error.message); }
        else { flashMsg(picked.length+" "+t("jobsCreated")); }
        loadAll();
      });
    });
  }

  // ---- ARCHIVE (admin only) ----
  var SRC_LABEL={ contact_submissions:{fr:"Demande",en:"Inquiry"}, jobs:{fr:"Mandat",en:"Job"}, profiles:{fr:"Personnel",en:"Staff"}, applications:{fr:"Candidature",en:"Application"}, reviews:{fr:"Avis",en:"Review"}, coordination_files:{fr:"Dossier famille",en:"Family file"} };
  function srcLabel(s){ var e=SRC_LABEL[s]; return e?(e[LANG]||e.fr):s; }

  function renderArchive(m){
    var rows=DATA.archive||[];
    m.innerHTML='<h2 class="module-title">'+esc(t("archive"))+'</h2>'+
      '<div class="controls">'+
        (rows.length?'<button class="btn btn--solid tbtn" id="expAll">'+esc(t("exportExcel"))+'</button>':'')+
        '<span class="count">'+rows.length+'</span></div>'+
      '<div class="sub-list" id="arcList"></div><div class="empty hide" id="arcEmpty">'+esc(t("noArchive"))+'</div>';
    document.getElementById("arcEmpty").classList.toggle("hide",rows.length>0);
    document.getElementById("arcList").innerHTML=rows.map(function(r){
      return '<div class="card2"><div class="c-top"><span class="c-name">'+esc(r.label||"—")+'</span>'
        +'<span class="c-date"><span class="pill">'+esc(srcLabel(r.source_table))+'</span></span></div>'
        +'<div class="c-meta">'
        +'<div><span class="lbl">'+esc(t("archivedOn"))+'</span>'+esc(fmtDate(r.archived_at))+'</div>'
        +'<div><span class="lbl">'+esc(t("archivedBy"))+'</span>'+esc(r.archived_by||"—")+'</div>'
        +'</div>'
        +'<details style="margin:6px 0 10px"><summary style="cursor:pointer;color:var(--gold-deep);font-size:.85rem">'+esc(t("viewData"))+'</summary><div class="c-msg" style="margin-top:8px">'+esc(JSON.stringify(r.data,null,2))+'</div></details>'
        +'<div class="c-actions">'
        +'<button class="btn btn--ghost tbtn" data-exp1="'+esc(r.id)+'">'+esc(t("exportExcel"))+'</button>'
        +'<button class="btn btn--ghost tbtn" data-restore="'+esc(r.id)+'">'+esc(t("restore"))+'</button>'
        +'<button class="btn btn--ghost tbtn" data-delforever="'+esc(r.id)+'" style="color:#a8402d">'+esc(t("deleteForever"))+'</button>'
        +'</div></div>';
    }).join('');
    // export all
    var expAll=document.getElementById("expAll");
    if(expAll) expAll.addEventListener("click", function(){ exportRows(rows, "archive"); });
    // per-row export
    document.querySelectorAll("[data-exp1]").forEach(function(b){ b.addEventListener("click", function(){ var r=rows.filter(function(x){return String(x.id)===String(b.getAttribute("data-exp1"));})[0]; if(r) exportRows([r], "archive_"+(r.label||"item")); }); });
    // restore
    document.querySelectorAll("[data-restore]").forEach(function(b){ b.addEventListener("click", function(){ if(!confirm(t("restoreConfirm"))) return; restoreRow(b.getAttribute("data-restore")); }); });
    // delete forever (logs to shared Google Sheet first)
    document.querySelectorAll("[data-delforever]").forEach(function(b){ b.addEventListener("click", function(){
      if(!confirm(t("deleteForeverConfirm"))) return;
      var id=b.getAttribute("data-delforever"); var r=rows.filter(function(x){return String(x.id)===String(id);})[0];
      if(!r){ return; }
      // Build one flat row for the sheet: when, by, type, label, then the data as JSON.
      var sheetRow=[ new Date().toISOString(), ME.name||"", r.source_table||"", r.label||"", JSON.stringify(r.data||{}) ];
      b.disabled=true;
      sb.functions.invoke("log-deletion", { body:{ row: sheetRow } }).then(function(res){
        if(res.error || (res.data && res.data.error)){
          // Sheet logging failed — fall back to Excel download so nothing is lost, and warn.
          exportRows([r], "deleted_"+(r.label||"item"));
          alert((LANG==="fr"?"Journalisation Google Sheet échouée — un fichier Excel a été téléchargé à la place. Erreur : ":"Google Sheet logging failed — an Excel file was downloaded instead. Error: ")+((res.error&&(res.error.message||res.error))||(res.data&&res.data.error)));
        }
        // Proceed to delete regardless (the record is safe: in the sheet or the Excel fallback).
        sb.from("archive").delete().eq("id",id).then(function(res2){ b.disabled=false; if(res2.error){ alert(res2.error.message); return; } loadAll(); });
      }, function(err){
        exportRows([r], "deleted_"+(r.label||"item"));
        alert((LANG==="fr"?"Journalisation échouée — fichier Excel téléchargé. ":"Logging failed — Excel file downloaded. ")+err);
        sb.from("archive").delete().eq("id",id).then(function(){ b.disabled=false; loadAll(); });
      });
    }); });
  }

  function exportRows(rows, filename){
    try{
      // flatten each archived record's data into a row
      var flat=rows.map(function(r){
        var base={ _type:r.source_table, _label:r.label, _archived_at:r.archived_at, _archived_by:r.archived_by };
        var d=r.data||{};
        Object.keys(d).forEach(function(k){ var v=d[k]; base[k]=(v&&typeof v==="object")?JSON.stringify(v):v; });
        return base;
      });
      var ws=XLSX.utils.json_to_sheet(flat);
      var wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Archive");
      XLSX.writeFile(wb, (filename||"archive")+".xlsx");
    }catch(e){ alert("Export error: "+e); }
  }

  function restoreRow(id){
    var r=(DATA.archive||[]).filter(function(x){return String(x.id)===String(id);})[0]; if(!r) return;
    // insert the data back into its source table, then remove from archive
    sb.from(r.source_table).insert(r.data).then(function(res){
      if(res.error){ alert("Restore error: "+res.error.message); return; }
      sb.from("archive").delete().eq("id",id).then(function(){ loadAll(); });
    });
  }

  // Build safe social links from sanitized handles (defense-in-depth: re-clean here).
  function safeHandle(v){ if(!v) return ""; var s=String(v).replace(/^@/,""); return /^[A-Za-z0-9._-]{1,40}$/.test(s)?s:""; }
  function socialLinks(r){
    var out="";
    var ig=safeHandle(r.ig_handle), fb=safeHandle(r.fb_handle), tt=safeHandle(r.tt_handle);
    if(ig) out+='<div><span class="lbl">Instagram</span><a href="https://instagram.com/'+encodeURIComponent(ig)+'" target="_blank" rel="noopener noreferrer">@'+esc(ig)+'</a></div>';
    if(fb) out+='<div><span class="lbl">Facebook</span><a href="https://facebook.com/'+encodeURIComponent(fb)+'" target="_blank" rel="noopener noreferrer">'+esc(fb)+'</a></div>';
    if(tt) out+='<div><span class="lbl">TikTok</span><a href="https://tiktok.com/@'+encodeURIComponent(tt)+'" target="_blank" rel="noopener noreferrer">@'+esc(tt)+'</a></div>';
    return out;
  }

  setLang(LANG);
  sb.auth.getSession().then(function(res){ if(res.data&&res.data.session) boot(); else showLogin(); });
})();
</script>
